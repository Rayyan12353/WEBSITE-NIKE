<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold fs-4" href="#">NIKE</a>
      <div class="collapse navbar-collapse justify-content-end">

          <li class="nav-item"><a class="nav-link" href="produk-nike.html">Produk</a></li>

          <li class="nav-item"><a class="nav-link" href="kontak-1.html">CONTACT</a></li>

  <!-- Running Text -->
  <div class="bg-warning text-center py-2">
    <marquee scrollamount="3" onmouseover="this.stop();" onmouseout="this.start();">
      WELCOME TO NIKE STORE !!
    </marquee>

  <!-- Konten Utama -->
  <div class="container my-5">
    <h2 class="mb-4">KONTAK PENGADUAN KELUHAN PENGGUNA NIKE STORE</h2>
    <form>
      <div class="mb-3">
        <label for="nama" class="form-label">Nama Lengkap</label>
        <input type="text" class="form-control" id="nama" name="txtNama">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" name="txtmail">
      </div>
      <div class="mb-3">
        <label for="nohp" class="form-label">No. HP</label>
        <input type="text" class="form-control" id="nohp" name="txtnohp">
      </div>
      <div class="mb-3">
        <label for="kota" class="form-label">Kota</label>
        <input type="text" class="form-control" id="kota" name="txtkota">
      </div>
      <div class="mb-3">
        <label for="pesan" class="form-label">Pesan</label>
        <textarea class="form-control" id="pesan" rows="5"></textarea>
      </div>
      <a href="pemberitahuan-pengaduan-berhasil.html" class="btn btn-primary">Kirim</a>

  <!-- React JSX (Kosong saat ini, bisa ditambahkan komponen interaktif) -->
  <script type="text/babel">
    // Contoh tambahan (tidak wajib)
    function InfoTambahan() {
      return (
        <div className="alert alert-info text-center">
          Pastikan data yang Anda isi sudah benar sebelum mengirim.
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<InfoTambahan />);
