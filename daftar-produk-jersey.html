<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>NIKE Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- React CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel (for JSX support) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const products = [
      { img: "jersey-basket-2.jpg", title: "Stephen Curry Golden State Warriors 2024 Select Series", link: "daftar-harga-produk-jersey-warriors-hitam.html" },
      { img: "jersey-basket-3.jpg", title: "Golden State Warriors Icon Edition 2022/23", link: "daftar-harga-produk-jersey-warriors-biru.html" },
      { img: "jersey-basket-4.jpg", title: "LeBron James Los Angeles Lakers 2024 Select Series", link: "daftar-harga-produk-jersey-lakers-hitam.html" },
      { img: "jersey-basket-5.jpg", title: "Los Angeles Lakers Icon Edition 2022/23", link: "daftar-harga-produk-jersey-lakers-kuning.html" },
      { img: "jersey-basket-6.jpg", title: "Boston Celtics Icon Edition 2022/23", link: "daftar-harga-produk-jersey-boston.html" },
      { img: "jersey-basket-7.jpg", title: "Golden State Warriors Association Edition 2023/24", link: "daftar-harga-produk-jersey-warriors-putih.html" },
      { img: "jersey-basket-8.jpg", title: "Los Angeles Lakers Association Edition 2022/23", link: "daftar-harga-produk-jersey-lakers-putih.html" },
      { img: "jersey-basket-9.jpg", title: "Phoenix Suns 2023/24 Icon Edition", link: "daftar-harga-produk-jersey-suns-ungu.html" },
      { img: "jersey-basket-10.jpg", title: "Milwaukee Bucks Association Edition 2022/23", link: "daftar-harga-produk-jersey-bucks-putih.html" },
      { img: "jersey-basket-11.jpg", title: "Phoenix Suns Association Edition 2023/24", link: "daftar-harga-produk-jersey-suns-putih.html" },
      { img: "jersey-basket-12.jpg", title: "Giannis Antetokounmpo Milwaukee Bucks 2024 Select Series", link: "daftar-harga-produk-jersey-milwukee-hitam.html" },
      { img: "jersey-basket-13.jpg", title: "Milwaukee Bucks Icon Edition 2022/23", link: "daftar-harga-produk-jersey-milwukee-hijau.html" }
    ];

    const Navbar = () => (
      <nav className="navbar navbar-expand-lg navbar-dark bg-dark">
        <div className="container-fluid px-4">
          <a className="navbar-brand fw-bold" href="#">NIKE</a>
          <button className="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span className="navbar-toggler-icon"></span>
          </button>
          <div className="collapse navbar-collapse" id="navbarNav">
            <ul className="navbar-nav ms-auto">
              <li class="nav-item"><a class="nav-link" href="UAS PRAKTIKUM.HTML">HOME</a></li>
              <li className="nav-item"><a className="nav-link" href="produk-nike.html">Produk</a></li>
              <li className="nav-item"><a className="nav-link" href="profil-nike.html">About Me</a></li>
              <li className="nav-item"><a className="nav-link" href="kontak-1.html">Contact</a></li>
            </ul>
          </div>
        </div>
      </nav>
    );

    const Marquee = () => (
      <div className="bg-black text-white text-center py-2 fw-bold">
        <marquee scrollamount="3" onMouseOver={e => e.target.stop()} onMouseOut={e => e.target.start()}>
          WELCOME TO NIKE STORE !!
        </marquee>
      </div>
    );

    const ProductGrid = () => (
      <div className="container my-5">
        <div className="row g-4">
          {products.map((product, index) => (
            <div key={index} className="col-sm-6 col-md-4 col-lg-3">
              <div className="card h-100">
                <a href={product.link}>
                  <img src={product.img} className="card-img-top" alt={product.title} />
                </a>
                <div className="card-body">
                  <p className="card-text text-center">{product.title}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    const Footer = () => (
      <div className="bg-light text-center py-4 fw-bold">
        &copy; 2025 - 24.240.0038 Rayyan Ridhwan Awud Aziz
      </div>
    );

    const App = () => (
      <>
        <Navbar />
        <Marquee />
        <ProductGrid />
        <Footer />
      </>
    );

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
