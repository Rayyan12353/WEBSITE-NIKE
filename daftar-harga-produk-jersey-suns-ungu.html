<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>NIKE - Phoenix Suns Jersey</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- React & Babel CDN -->
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <style>
      .produk-img {
        max-width: 320px;
        border-radius: 10px;
      }

      .btn-size {
        width: 60px;
        margin: 5px;
      }

      .btn-beli {
        padding: 10px 25px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">NIKE</a>
        <div class="collapse navbar-collapse justify-content-end">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="UAS PRAKTIKUM.HTML">HOME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="daftar-produk-jersey.html">Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="profil-nike.html">ABOUT ME</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="kontak-1.html">CONTACT</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Running Text -->
    <div class="bg-warning text-center py-2">
      <marquee behavior="scroll" scrollamount="3" onmouseover="this.stop();" onmouseout="this.start();">
        WELCOME TO NIKE STORE !!
      </marquee>
    </div>

    <!-- React root -->
    <div class="container my-5" id="root"></div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
      &copy; 2025 - 24.240.0038 Rayyan Ridhwan Awud Aziz
    </footer>

    <!-- React Component -->
    <script type="text/babel">
      function ProdukPhoenixSuns() {
        const sizes = ["S", "M", "L", "XL", "XXL", "XXXL"];

        return (
          <div className="bg-white p-4 rounded shadow text-center">
            <img
              src="jersey-basket-9.jpg"
              alt="Phoenix Suns 2023/24 Icon Edition"
              className="img-fluid produk-img mb-4"
            />
            <h2 className="fw-bold">Phoenix Suns 2023/24 Icon Edition</h2>
            <p className="text-muted">Nike Dri-FIT NBA Swingman Jersey</p>
            <h4 className="text-danger fw-semibold">Rp 1.279.000</h4>

            <p className="fw-bold mt-4">Pilih Ukuran:</p>
            <div className="d-flex justify-content-center flex-wrap mb-4">
              {sizes.map((size, index) => (
                <button key={index} className="btn btn-outline-secondary btn-size">
                  {size}
                </button>
              ))}
            </div>

            <a href="data-pengiriman.html" className="btn btn-primary btn-beli">
              Beli Sekarang
            </a>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<ProdukPhoenixSuns />);
    </script>

    <!-- Bootstrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
