<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>NIKE AIR FORCE 1 '07 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- React CDN -->
    <script
      src="https://unpkg.com/react@18/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Custom Styles -->
    <style>
      body {
        background-color: #f8f9fa;
      }

      .produk-img {
        max-width: 300px;
        border-radius: 10px;
      }

      .btn-size {
        width: 50px;
      }

      .warna-sepatu img {
        width: 60px;
        height: 60px;
        margin-right: 10px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid #dee2e6;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">NIKE</a>
        <div class="collapse navbar-collapse justify-content-end">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="UAS PRAKTIKUM.HTML">HOME</a></li>
            <li class="nav-item"><a class="nav-link active" href="daftar-produk-sepatu.html">Produk</a></li>
            <li class="nav-item"><a class="nav-link" href="profil-nike.html">ABOUT ME</a></li>
            <li class="nav-item"><a class="nav-link" href="kontak-1.html">CONTACT</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Running Text -->
    <div class="bg-warning text-center py-2">
      <marquee behavior="scroll" scrollamount="3" onmouseover="this.stop();" onmouseout="this.start();">
        WELCOME TO NIKE STORE !!
      </marquee>
    </div>

    <!-- React Root -->
    <div class="container my-5" id="root"></div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
      &copy; 2025 - 24.240.0038 Rayyan Ridhwan Awud Aziz
    </footer>

    <!-- React Component -->
    <script type="text/babel">
      function Produk() {
        const sizes = [39, 40, 41, 42, 43, 44];
        const colors = [
          { img: "AIR FORCE 1'07 PUTIH.JPG", label: "Putih" },
          { img: "AIR FORCE 1'07 HITAM.JPG", label: "Hitam" },
        ];

        return (
          <div className="bg-white p-4 rounded shadow text-center">
            <img
              src="AIR FORCE 1'07 PUTIH.JPG"
              alt="Nike Air Force 1 '07 2"
              className="img-fluid produk-img mb-4"
            />
            <h2 className="fw-bold">Nike Air Force 1 '07 2</h2>
            <p className="text-muted">Men's Shoes</p>
            <p>
              Sepatu kasual dengan desain klasik dari Nike Air Force 1 '07 2,
              cocok untuk gaya sporty sehari-hari.
            </p>
            <h4 className="text-danger fw-semibold">Rp 1.549.000</h4>

            <p className="fw-bold mt-4">Pilih Warna:</p>
            <div className="warna-sepatu d-flex justify-content-center mb-4">
              {colors.map((color, index) => (
                <img
                  key={index}
                  src={color.img}
                  alt={color.label}
                  title={color.label}
                />
              ))}
            </div>

            <p className="fw-bold">Pilih Ukuran:</p>
            <div className="d-flex justify-content-center gap-2 flex-wrap mb-4">
              {sizes.map((size) => (
                <button
                  key={size}
                  className="btn btn-outline-secondary btn-size"
                >
                  {size}
                </button>
              ))}
            </div>

            <a href="data-pengiriman.html" className="btn btn-primary px-4">
              Beli Sekarang
            </a>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<Produk />);
    </script>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
